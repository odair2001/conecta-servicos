<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Redefinir Senha - 5-Star Providers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.ico">
  
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">

    <span class="navbar-brand fw-bold text-primary">
      5-Star Providers
    </span>

  </div>
</nav>

<!-- Botão voltar -->
<div class="container mt-3">
    <button class="btn btn-secondary" onclick="window.location.href='login.html'">
      ← Voltar
    </button>
</div>

<!-- Conteúdo -->
<div class="container mt-5">

<div class="card shadow-sm p-4 mx-auto" style="max-width:400px;">

<h4 class="text-center mb-4">
Redefinir Senha
</h4>

<input 
type="password" 
id="novaSenha" 
class="form-control mb-3"
placeholder="Nova senha"
>

<button onclick="redefinirSenha()" class="btn btn-success w-100">
Salvar Nova Senha
</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function redefinirSenha() {

const senha = document.getElementById("novaSenha").value;

const { error } = await supabaseClient.auth.updateUser({
password: senha
});

if (error) {
alert("Erro: " + error.message);
} else {
alert("Senha atualizada com sucesso!");
window.location.href = "login.html";
}

}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center text-muted mt-5 mb-3 small">
Projeto acadêmico de extensão • 5-Star Providers
</footer>
  
</body>
</html>
