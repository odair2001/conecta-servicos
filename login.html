<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - 5-Star Providers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">

    <span class="navbar-brand fw-bold text-primary">
      5-Star Providers
    </span>

  </div>
</nav>

<!-- Botão voltar -->
<div class="container mt-3">
  <button class="btn btn-secondary" onclick="history.back()">← Voltar</button>
</div>

<!-- Login -->
<div class="container mt-5">

<div class="card shadow-sm p-4 mx-auto" style="max-width:400px;">

<h4 class="mb-4 text-center">Entrar</h4>

<input
type="email"
id="email"
class="form-control mb-3"
placeholder="Seu email">

<input
type="password"
id="senha"
class="form-control mb-3"
placeholder="Sua senha">

<button
onclick="login()"
class="btn btn-primary w-100 mb-3">
Entrar
</button>

<div class="text-center">

<a href="criar-conta.html" class="btn btn-success w-100 mb-2">
Criar conta
</a>

<a href="#" onclick="esqueciSenha()">
Esqueci minha senha
</a>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>

<script>

async function login(){

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

const { error } = await supabaseClient.auth.signInWithPassword({
email: email,
password: senha
});

if(error){
alert("Email ou senha inválidos");
}else{
window.location.href = "index.html";
}

}

async function esqueciSenha(){

const email = prompt("Digite seu email para redefinir a senha:");

if(!email) return;

const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
redirectTo: window.location.origin + "/redefinir.html"
});

if(error){
alert("Erro ao enviar email");
}else{
alert("Email de redefinição enviado!");
}

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
