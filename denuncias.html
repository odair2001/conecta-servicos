<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Denúncias - 5-Star Providers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
<div class="container">

<span class="navbar-brand fw-bold text-primary">
5-Star Providers
</span>

<div>

<a href="lista.html" class="btn btn-outline-primary btn-sm">
Lista
</a>

<button class="btn btn-outline-danger btn-sm" onclick="logout()">
Sair
</button>

</div>

</div>
</nav>

<!-- Botão voltar -->
<div class="container mt-3">
<button class="btn btn-secondary" onclick="history.back()">
← Voltar
</button>
</div>

<!-- Conteúdo -->
<div class="container mt-4">

<h3 class="mb-3">Denúncias Recebidas</h3>

<div class="card shadow-sm p-3">

<div class="table-responsive">

<table class="table table-striped table-sm mb-0">
  
<thead>
<tr>
<th>Colaborador</th>
<th>Motivo</th>
<th>Denunciado por</th>
<th>Data</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="tabelaDenuncias"></tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>

<script>

verificarLogin();

/* VERIFICA ADMIN */

async function verificarAcessoAdmin(){

const isAdmin = await verificarAdmin();

if(!isAdmin){

alert("Acesso restrito");

window.location.href = "index.html";

return;

}

carregarDenuncias();

}

/* CARREGAR DENUNCIAS */

async function carregarDenuncias(){

const tabela = document.getElementById("tabelaDenuncias");

tabela.innerHTML = "";

const { data, error } = await supabaseClient
.from("denuncias")
.select(`
id,
motivo,
data,
profiles(email),
colaboradores(nome)
`)
.order("data", { ascending:false });

if(error){
console.log("Erro ao carregar denúncias:", error);
return;
}

data.forEach(d => {

tabela.innerHTML += `
<tr>

<td>${d.colaboradores?.nome || "Desconhecido"}</td>

<td>${d.motivo}</td>

<td>${d.profiles?.email || "Desconhecido"}</td>

<td>${new Date(d.data).toLocaleDateString()}</td>

<td>

<button onclick="excluirDenuncia(${d.id})"
class="btn btn-danger btn-sm">
Excluir
</button>

</td>

</tr>
`;

});

}

/* EXCLUIR DENUNCIA */

async function excluirDenuncia(id){

if(!confirm("Deseja excluir esta denúncia?")){
return;
}

const { error } = await supabaseClient
.from("denuncias")
.delete()
.eq("id", id);

if(error){

alert("Erro ao excluir denúncia");
console.log(error);

}else{

carregarDenuncias();

}

}

/* INICIAR */

document.addEventListener("DOMContentLoaded", async () => {

await verificarAcessoAdmin();

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
