<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Criar Conta - 5-Star Providers</title>
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:400px;">

<h2 class="text-center mb-4">Criar Conta</h2>

<div class="mb-3">
<input type="email" id="email" class="form-control" placeholder="Seu email">
</div>

<div class="mb-3">
<input type="password" id="senha" class="form-control" placeholder="Crie uma senha">
</div>

<div class="d-grid mb-3">
<button class="btn btn-primary" onclick="criarConta()">Criar Conta</button>
</div>

<p id="msg" class="text-center"></p>

<div class="d-grid">
<button class="btn btn-secondary" onclick="history.back()">← Voltar</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function criarConta() {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { error } = await supabaseClient.auth.signUp({
        email: email,
        password: senha
    });

    if (error) {
        document.getElementById("msg").innerText = error.message;
    } else {
        document.getElementById("msg").innerText =
        "Conta criada! Verifique seu email antes de fazer login.";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
