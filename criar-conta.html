<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Criar Conta - 5-Star Providers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.ico">
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold text-primary">
        5-Star Providers
        </span>
    </div>
</nav>

<!-- Botão voltar -->
<div class="container mt-3">
    <button class="btn btn-secondary" onclick="history.back()">← Voltar</button>
</div>

<!-- Conteúdo -->


    
<div class="container mt-5">

<div class="card shadow-sm p-4 mx-auto" style="max-width:500px;">

<h4 class="mb-4 text-center">Criar Conta</h4>

<input type="email" id="email" class="form-control mb-3" placeholder="Seu email">

<input type="password" id="senha" class="form-control mb-3" placeholder="Crie uma senha">
    
<div class="form-check mt-3">

<input class="form-check-input"
type="checkbox"
id="aceitarTermos">

<label class="form-check-label">

Eu concordo com os
<a href="termos.html">
Termos de Uso
</a>

</label>

</div>
    
<button id="btnCadastrar" class="btn btn-success w-100" disabled onclick="criarConta()">
Criar Conta
</button>

<p id="msg" class="text-center text-muted mt-3"></p>

</div>
    


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>

async function criarConta() {

let email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;
const aceitou = document.getElementById("aceitarTermos").checked;

// normaliza email
email = email.trim().toLowerCase();

if(!email || !senha){
alert("Preencha email e senha.");
return;
}

if(!aceitou){
alert("Você precisa aceitar os Termos de Uso.");
return;
}

// 🔎 verifica se já existe no banco (profiles)
const { data: existente } = await supabaseClient
.from("profiles")
.select("id")
.eq("email", email)
.maybeSingle();

if (existente) {
alert("Este email já está cadastrado. Tente fazer login.");
return;
}

// 🔐 tenta criar conta
const { data, error } = await supabaseClient.auth.signUp({
email: email,
password: senha
});

if (error) {

const msg = error.message.toLowerCase();

if (msg.includes("already") || msg.includes("exists") || msg.includes("registered")) {
alert("Este email já está cadastrado. Tente fazer login.");
} else {
alert("Erro ao cadastrar: " + error.message);
}

return;
}
    
// ⚠️ segurança extra (caso Supabase não retorne erro)
if (!data.user) {
alert("Este email já está cadastrado. Tente fazer login.");
return;
}

// ✅ sucesso
alert("Conta criada com sucesso! Verifique sua caixa de email.");
window.location.href = "login.html";

document.getElementById("email").value = "";
document.getElementById("senha").value = "";

}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center text-muted mt-5 mb-3 small">
Projeto acadêmico de extensão • 5-Star Providers
</footer>

<script>

document.getElementById("aceitarTermos")
.addEventListener("change", function(){

const botao = document.getElementById("btnCadastrar");

botao.disabled = !this.checked;

});

</script>
    
</body>
</html>
