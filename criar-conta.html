<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Criar Conta - 5-Star Providers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold text-primary">
        5-Star Providers
        </span>
    </div>
</nav>

<!-- Botão voltar -->
<div class="container mt-3">
    <button class="btn btn-secondary" onclick="history.back()">← Voltar</button>
</div>

<!-- Conteúdo -->


    
<div class="container mt-5">

<div class="card shadow-sm p-4 mx-auto" style="max-width:500px;">

<h4 class="mb-4 text-center">Criar Conta</h4>

<input type="email" id="email" class="form-control mb-3" placeholder="Seu email">

<input type="password" id="senha" class="form-control mb-3" placeholder="Crie uma senha">

<button onclick="criarConta()" class="btn btn-success w-100">
Criar Conta
</button>

<p id="msg" class="text-center text-muted mt-3"></p>

</div>
    
<div class="form-check mt-3">

<input class="form-check-input"
type="checkbox"
id="aceitarTermos">

<label class="form-check-label">

Eu concordo com os
<a href="termos.html" target="_blank">
Termos de Uso
</a>

</label>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function criarConta() {

const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

const aceitou = document.getElementById("aceitarTermos").checked;

if(!aceitou){
alert("Você precisa aceitar os Termos de Uso.");
return;
}
    
const { error } = await supabaseClient.auth.signUp({
email: email,
password: senha
});

if (error) {
document.getElementById("msg").innerText = error.message;
} else {
document.getElementById("msg").innerText =
"Conta criada! Verifique seu email antes de fazer login.";
}
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center text-muted mt-5 mb-3 small">
Projeto acadêmico de extensão • 5-Star Providers
</footer>
    
</body>
</html>
