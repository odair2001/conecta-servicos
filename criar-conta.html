<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Criar Conta - 5-Star Providers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container d-flex justify-content-between align-items-center">

    <span class="navbar-brand fw-bold text-primary">
      5-Star Providers
    </span>

    <button onclick="history.back()" class="btn btn-outline-secondary btn-sm">
      ← Voltar
    </button>

  </div>
</nav>

<div class="container mt-5" style="max-width:420px;">

    <div class="card shadow-sm p-4">

        <h4 class="text-center mb-4">Criar Conta</h4>

        <div class="mb-3">
            <input type="email" id="email" class="form-control" placeholder="Seu email">
        </div>

        <div class="mb-3">
            <input type="password" id="senha" class="form-control" placeholder="Crie uma senha">
        </div>

        <div class="d-grid">
            <button onclick="criarConta()" class="btn btn-success">
                Criar Conta
            </button>
        </div>

        <p id="msg" class="text-center mt-3 small text-muted"></p>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
async function criarConta() {

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { error } = await supabaseClient.auth.signUp({
        email: email,
        password: senha
    });

    if (error) {
        document.getElementById("msg").innerText = error.message;
    } else {
        document.getElementById("msg").innerText =
        "Conta criada! Verifique seu email antes de fazer login.";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
